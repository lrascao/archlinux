---

- name: install virtual box from AUR
  aur: name={{ item }} user={{ archlinux_username }}
  with_items:
    - virtualbox-bin
    - virtualbox-ext-oracle

- name: install virtual box addons
  pacman:
    name:
    - virtualbox-guest-utils
    - virtualbox-ext-vnc
    - virtualbox-guest-dkms
  become: true

- name: install k8s from AUR
  aur: name={{ item }} user={{ archlinux_username }}
  with_items:
    - kubectl
    - minikube

- name: enable VirtualBox daemon
  systemd:
    name: vboxweb.service
    state: started
    enabled: true
  become: true
